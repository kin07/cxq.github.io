<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网关管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #F9FAFB;
            --column-bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--primary-bg);
            color: var(--text-primary);
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: white;
            padding: 16px 24px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            color: var(--primary);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .main-content {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 24px;
            min-height: calc(100vh - 100px);
        }

        .sidebar {
            background: white;
            border-radius: 16px;
            padding: 16px;
            height: fit-content;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 4px;
            color: var(--text-secondary);
            text-decoration: none;
        }

        .nav-item:hover {
            background: var(--column-bg);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            color: white;
        }

        .nav-item i {
            font-size: 18px;
        }

        .content-frame {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        iframe {
            width: 100%;
            height: calc(100vh - 140px);
            border: none;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 200px 1fr;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: flex;
                overflow-x: auto;
                padding: 12px;
                gap: 8px;
            }

            .nav-item {
                flex-shrink: 0;
                white-space: nowrap;
            }

            iframe {
                height: calc(100vh - 180px);
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="ri-git-branch-line"></i>
            网关管理系统
        </div>
        <div class="user-info">
            <span>系统管理员</span>
            <div class="user-avatar">A</div>
        </div>
    </header>

    <div class="container">
        <div class="main-content">
            <nav class="sidebar">
                <a href="#" class="nav-item active" onclick="loadPage('system-management-new.html', this)">
                    <i class="ri-dashboard-line"></i>
                    <span>网关管理</span>
                </a>

                <a href="#" class="nav-item" onclick="loadPage('organization-management.html', this)">
                    <i class="ri-team-line"></i>
                    <span>组织管理</span>
                </a>
                <a href="#" class="nav-item" onclick="loadPage('admin-management.html', this)">
                    <i class="ri-admin-line"></i>
                    <span>系统管理</span>
                </a>
                <a href="#" class="nav-item" onclick="loadPage('log-management.html', this)">
                    <i class="ri-file-list-3-line"></i>
                    <span>日志管理</span>
                </a>
            </nav>
            <main class="content-frame">
                <iframe id="contentFrame" src="system-management-new.html"></iframe>
            </main>
        </div>
    </div>

    <script>
        function loadPage(pageUrl, element) {
            const iframe = document.getElementById('contentFrame');
            iframe.src = pageUrl;

            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');

            console.log(`[Navigation] Loading page: ${pageUrl}`);
        }
    </script>
</body>
</html>
