<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色管理 - 网关管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #F9FAFB;
            --column-bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--primary-bg);
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 14px;
        }

        .page-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: white;
            position: relative;
        }

        .page-header-actions {
            position: absolute;
            top: 16px;
            right: 20px;
            display: flex;
            gap: 8px;
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            background: var(--primary-bg);
        }

        .search-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 0 0 auto;
        }

        .form-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.2s ease;
            font-family: inherit;
            min-width: 150px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            font-size: 13px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: white;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--column-bg);
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        .data-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table thead {
            background: var(--column-bg);
        }

        .table th {
            padding: 14px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table td {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
        }

        .table tbody tr:hover {
            background: var(--column-bg);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.active {
            background: #ECFDF5;
            color: var(--success);
        }

        .status-badge.inactive {
            background: #F1F5F9;
            color: var(--text-secondary);
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: white;
            color: var(--text-primary);
            transition: all 0.2s ease;
            margin-right: 6px;
        }

        .action-btn:hover {
            background: var(--column-bg);
        }

        .action-btn.danger {
            color: var(--danger);
            border-color: var(--danger);
        }

        .action-btn.danger:hover {
            background: #FEF2F2;
        }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 12px;
            padding: 28px 32px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .modal-box.wide {
            width: 600px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-form-group {
            margin-bottom: 16px;
        }

        .modal-form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        .modal-form-label .required {
            color: var(--danger);
            margin-left: 2px;
        }

        .modal-form-input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .modal-form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .modal-form-textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            transition: all 0.2s;
        }

        .modal-form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
        }

        /* 权限树样式 */
        .perm-tree {
            border: 1px solid var(--border);
            border-radius: 6px;
            max-height: 300px;
            overflow-y: auto;
            padding: 8px;
        }

        .perm-node {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .perm-node:hover {
            background: var(--column-bg);
        }

        .perm-node input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .perm-label {
            font-size: 13px;
        }

        .perm-children {
            margin-left: 24px;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b;
            color: white;
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { background: #10B981; }
        .toast.danger  { background: var(--danger); }

        @media (max-width: 768px) {
            .search-form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h2 class="page-title">
            <i class="ri-shield-user-line"></i>
            <span>角色管理</span>
        </h2>
        <div class="breadcrumb">
            <i class="ri-home-line"></i>
            <span>></span>
            <span>系统管理</span>
            <span>></span>
            <span>角色管理</span>
        </div>
        <div class="page-header-actions">
            <button class="btn btn-primary" onclick="openRoleModal()">
                <i class="ri-add-line"></i>
                新增角色
            </button>
        </div>
    </div>

    <div class="content-area">
        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-form">
                <div class="form-group">
                    <label class="form-label">角色名称</label>
                    <input type="text" class="form-input" placeholder="请输入角色名称" id="searchName">
                </div>
                <div class="form-group">
                    <label class="form-label">状态</label>
                    <select class="form-input" id="searchStatus">
                        <option value="">全部</option>
                        <option value="active">启用</option>
                        <option value="inactive">停用</option>
                    </select>
                </div>
                <div class="form-group" style="flex-direction: row; gap: 8px; align-self: flex-end;">
                    <button class="btn btn-primary" onclick="searchData()">
                        <i class="ri-search-line"></i>
                        查询
                    </button>
                </div>
            </div>
        </div>

        <!-- 角色列表表格 -->
        <div class="data-table">
            <table class="table">
                <thead>
                    <tr>
                        <th>角色名称</th>
                        <th>角色编码</th>
                        <th>描述</th>
                        <th>状态</th>
                        <th>用户数</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="roleTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- 新增/编辑角色弹窗 -->
    <div class="modal-overlay" id="roleModal">
        <div class="modal-box">
            <div class="modal-title">
                <i class="ri-user-add-line" id="roleModalIcon"></i>
                <span id="roleModalTitle">新增角色</span>
            </div>
            <div class="modal-form-group">
                <label class="modal-form-label">角色名称<span class="required">*</span></label>
                <input type="text" class="modal-form-input" id="roleName" placeholder="如：系统管理员">
            </div>
            <div class="modal-form-group">
                <label class="modal-form-label">角色编码<span class="required">*</span></label>
                <input type="text" class="modal-form-input" id="roleCode" placeholder="如：ADMIN">
            </div>
            <div class="modal-form-group">
                <label class="modal-form-label">描述</label>
                <textarea class="modal-form-textarea" id="roleRemark" placeholder="请输入角色描述"></textarea>
            </div>
            <div class="modal-form-group">
                <label class="modal-form-label">状态</label>
                <select class="modal-form-input" id="roleStatus">
                    <option value="active">启用</option>
                    <option value="inactive">停用</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeRoleModal()">取消</button>
                <button class="btn btn-primary" onclick="submitRoleModal()">确认</button>
            </div>
        </div>
    </div>

    <!-- 权限配置弹窗 -->
    <div class="modal-overlay" id="permModal">
        <div class="modal-box wide">
            <div class="modal-title">
                <i class="ri-lock-unlock-line"></i>
                <span>配置权限 - <span id="permRoleName"></span></span>
            </div>
            <div class="perm-tree" id="permTree">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closePermModal()">取消</button>
                <button class="btn btn-primary" onclick="submitPermModal()">保存</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // 菜单权限数据
        const menus = [
            { id: 'sys', name: '系统管理', children: [
                { id: 'sys-api', name: 'API管理' },
                { id: 'sys-site', name: '站点管理' },
                { id: 'sys-auth', name: 'API授权' },
                { id: 'sys-sub', name: '订阅管理' }
            ]},
            { id: 'org', name: '组织管理', children: [
                { id: 'org-dept', name: '部门管理' },
                { id: 'org-user', name: '用户管理' }
            ]},
            { id: 'perm', name: '权限管理', children: [
                { id: 'perm-role', name: '角色管理' },
                { id: 'perm-menu', name: '菜单权限' }
            ]},
            { id: 'log', name: '操作日志', children: [
                { id: 'log-op', name: '操作记录' }
            ]}
        ];

        // 角色数据
        const roles = [
            { id: 1, name: '超级管理员', code: 'SUPER_ADMIN', remark: '拥有所有权限', status: 'active', userCount: 1, createTime: '2024-01-01 10:00:00', permissions: ['sys', 'sys-api', 'sys-site', 'sys-auth', 'sys-sub', 'org', 'org-dept', 'org-user', 'perm', 'perm-role', 'perm-menu', 'log', 'log-op'] },
            { id: 2, name: '普通管理员', code: 'ADMIN', remark: '除权限管理外的所有权限', status: 'active', userCount: 3, createTime: '2024-01-15 10:00:00', permissions: ['sys', 'sys-api', 'sys-site', 'sys-auth', 'sys-sub', 'org', 'org-dept', 'org-user', 'log', 'log-op'] },
            { id: 3, name: '运营人员', code: 'OPERATOR', remark: '只读权限，可查看系统数据', status: 'active', userCount: 5, createTime: '2024-02-01 10:00:00', permissions: ['sys-api', 'sys-site', 'org', 'org-dept', 'log', 'log-op'] },
            { id: 4, name: '访客', code: 'GUEST', remark: '只读权限', status: 'inactive', userCount: 0, createTime: '2024-03-01 10:00:00', permissions: [] }
        ];

        let nextRoleId = 100;
        let roleModalMode = 'add';
        let editRoleId = null;
        let permRoleId = null;
        let selectedPerms = [];

        // ============ 工具函数 ============
        let toastTimer = null;
        function showToast(msg, type = 'success') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show ' + type;
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { el.className = 'toast'; }, 2500);
        }

        // ============ 渲染角色表格 ============
        function renderRoleTable() {
            const tbody = document.getElementById('roleTableBody');
            const nameFilter = document.getElementById('searchName').value.trim().toLowerCase();
            const statusFilter = document.getElementById('searchStatus').value;

            const filteredRoles = roles.filter(role => {
                if (nameFilter && !role.name.toLowerCase().includes(nameFilter)) return false;
                if (statusFilter && role.status !== statusFilter) return false;
                return true;
            });

            if (filteredRoles.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px; color: var(--text-secondary);">
                            <i class="ri-shield-user-line" style="font-size: 48px; margin-bottom: 12px; display: block; opacity: 0.5;"></i>
                            <p>暂无角色数据</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = filteredRoles.map(role => `
                <tr>
                    <td style="font-weight: 600;">${role.name}</td>
                    <td><code style="background: var(--column-bg); padding: 2px 8px; border-radius: 4px; font-size: 12px;">${role.code}</code></td>
                    <td>${role.remark || '-'}</td>
                    <td><span class="status-badge ${role.status}">${role.status === 'active' ? '启用' : '停用'}</span></td>
                    <td>${role.userCount}</td>
                    <td>${role.createTime}</td>
                    <td>
                        <button class="action-btn" onclick="openPermModal(${role.id})">权限配置</button>
                        <button class="action-btn" onclick="openEditRoleModal(${role.id})">编辑</button>
                        <button class="action-btn danger" onclick="deleteRole(${role.id}, '${role.name}')">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // ============ 搜索 ============
        function searchData() {
            renderRoleTable();
        }

        // ============ 新增/编辑角色弹窗 ============
        function openRoleModal() {
            roleModalMode = 'add';
            editRoleId = null;
            document.getElementById('roleModalIcon').className = 'ri-user-add-line';
            document.getElementById('roleModalTitle').textContent = '新增角色';
            document.getElementById('roleName').value = '';
            document.getElementById('roleCode').value = '';
            document.getElementById('roleRemark').value = '';
            document.getElementById('roleStatus').value = 'active';
            document.getElementById('roleModal').classList.add('active');
            setTimeout(() => document.getElementById('roleName').focus(), 100);
        }

        function openEditRoleModal(roleId) {
            const role = roles.find(r => r.id === roleId);
            if (!role) return;

            roleModalMode = 'edit';
            editRoleId = roleId;
            document.getElementById('roleModalIcon').className = 'ri-edit-line';
            document.getElementById('roleModalTitle').textContent = '编辑角色';
            document.getElementById('roleName').value = role.name;
            document.getElementById('roleCode').value = role.code;
            document.getElementById('roleRemark').value = role.remark || '';
            document.getElementById('roleStatus').value = role.status;
            document.getElementById('roleModal').classList.add('active');
            setTimeout(() => document.getElementById('roleName').focus(), 100);
        }

        function closeRoleModal() {
            document.getElementById('roleModal').classList.remove('active');
        }

        function submitRoleModal() {
            const name = document.getElementById('roleName').value.trim();
            const code = document.getElementById('roleCode').value.trim().toUpperCase();
            const remark = document.getElementById('roleRemark').value.trim();
            const status = document.getElementById('roleStatus').value;

            if (!name) { showToast('角色名称不能为空', 'danger'); document.getElementById('roleName').focus(); return; }
            if (!code) { showToast('角色编码不能为空', 'danger'); document.getElementById('roleCode').focus(); return; }

            const now = new Date();
            const createTime = now.toISOString().replace('T', ' ').substring(0, 19);

            if (roleModalMode === 'add') {
                // 检查编码是否已存在
                if (roles.find(r => r.code === code)) {
                    showToast('角色编码已存在', 'danger');
                    return;
                }

                roles.push({
                    id: nextRoleId++,
                    name,
                    code,
                    remark,
                    status,
                    userCount: 0,
                    createTime,
                    permissions: []
                });
                showToast(`角色「${name}」新增成功`, 'success');
            } else {
                const role = roles.find(r => r.id === editRoleId);
                if (role) {
                    role.name = name;
                    role.code = code;
                    role.remark = remark;
                    role.status = status;
                }
                showToast(`角色「${name}」更新成功`, 'success');
            }

            renderRoleTable();
            closeRoleModal();
        }

        // ============ 权限配置弹窗 ============
        function openPermModal(roleId) {
            const role = roles.find(r => r.id === roleId);
            if (!role) return;

            permRoleId = roleId;
            selectedPerms = [...(role.permissions || [])];
            document.getElementById('permRoleName').textContent = role.name;
            renderPermTree();
            document.getElementById('permModal').classList.add('active');
        }

        function closePermModal() {
            document.getElementById('permModal').classList.remove('active');
        }

        function renderPermTree() {
            const container = document.getElementById('permTree');
            container.innerHTML = menus.map(menu => renderMenuNode(menu)).join('');
        }

        function renderMenuNode(menu) {
            const isChecked = selectedPerms.includes(menu.id);
            const hasChildren = menu.children && menu.children.length > 0;
            const allChecked = hasChildren && menu.children.every(c => selectedPerms.includes(c.id));
            const someChecked = hasChildren && menu.children.some(c => selectedPerms.includes(c.id)) && !allChecked;

            let html = `
                <div class="perm-node">
                    <input type="checkbox" id="perm-${menu.id}" 
                        ${isChecked || allChecked ? 'checked' : ''} 
                        ${someChecked ? 'indeterminate' : ''}
                        onchange="togglePerm('${menu.id}', this.checked)">
                    <label class="perm-label" for="perm-${menu.id}" style="font-weight: 600;">${menu.name}</label>
                </div>
            `;

            if (hasChildren) {
                html += `<div class="perm-children">`;
                html += menu.children.map(child => {
                    const childChecked = selectedPerms.includes(child.id);
                    return `
                        <div class="perm-node">
                            <input type="checkbox" id="perm-${child.id}" 
                                ${childChecked ? 'checked' : ''} 
                                onchange="togglePerm('${child.id}', this.checked)">
                            <label class="perm-label" for="perm-${child.id}">${child.name}</label>
                        </div>
                    `;
                }).join('');
                html += `</div>`;
            }

            return html;
        }

        function togglePerm(permId, checked) {
            if (checked) {
                if (!selectedPerms.includes(permId)) {
                    selectedPerms.push(permId);
                }
                // 如果是父级菜单，自动选中所有子级
                const menu = menus.find(m => m.id === permId);
                if (menu && menu.children) {
                    menu.children.forEach(child => {
                        if (!selectedPerms.includes(child.id)) {
                            selectedPerms.push(child.id);
                        }
                    });
                }
            } else {
                const idx = selectedPerms.indexOf(permId);
                if (idx > -1) {
                    selectedPerms.splice(idx, 1);
                }
                // 如果是父级菜单，自动取消所有子级
                const menu = menus.find(m => m.id === permId);
                if (menu && menu.children) {
                    menu.children.forEach(child => {
                        const cidx = selectedPerms.indexOf(child.id);
                        if (cidx > -1) selectedPerms.splice(cidx, 1);
                    });
                }
            }
            renderPermTree();
        }

        function submitPermModal() {
            const role = roles.find(r => r.id === permRoleId);
            if (role) {
                role.permissions = [...selectedPerms];
                showToast(`角色「${role.name}」权限配置已保存`, 'success');
            }
            closePermModal();
        }

        // ============ 删除角色 ============
        function deleteRole(roleId, name) {
            const role = roles.find(r => r.id === roleId);
            if (role && role.userCount > 0) {
                showToast(`该角色下还有 ${role.userCount} 个用户，无法删除`, 'danger');
                return;
            }

            if (!confirm(`确定要删除角色「${name}」吗？此操作不可恢复。`)) return;

            const idx = roles.findIndex(r => r.id === roleId);
            if (idx > -1) {
                roles.splice(idx, 1);
                renderRoleTable();
                showToast(`角色「${name}」已删除`, 'success');
            }
        }

        // ============ 初始化 ============
        document.addEventListener('DOMContentLoaded', function() {
            renderRoleTable();
            console.log('[Init] Role management page loaded');
        });
    </script>
</body>
</html>
