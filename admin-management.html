<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统管理 - 网关管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #F9FAFB;
            --column-bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--primary-bg);
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 14px;
        }

        .page-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: white;
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Tab 样式 */
        .tabs-container {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }

        .tabs {
            display: flex;
            gap: 4px;
        }

        .tab {
            padding: 14px 20px;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab i {
            font-size: 18px;
        }

        .tab-content {
            display: none;
            padding: 20px 24px;
        }

        .tab-content.active {
            display: block;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            background: var(--primary-bg);
        }

        .search-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 0 0 auto;
        }

        .form-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.2s ease;
            font-family: inherit;
            min-width: 150px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            font-size: 13px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: white;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--column-bg);
        }

        .btn-danger {
            background: white;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: #FEF2F2;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        .page-header-actions {
            position: absolute;
            top: 16px;
            right: 20px;
            display: flex;
            gap: 8px;
        }

        .data-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table thead {
            background: var(--column-bg);
        }

        .table th {
            padding: 14px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table td {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
        }

        .table tbody tr:hover {
            background: var(--column-bg);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.active {
            background: #ECFDF5;
            color: var(--success);
        }

        .status-badge.inactive {
            background: #F1F5F9;
            color: var(--text-secondary);
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: white;
            color: var(--text-primary);
            transition: all 0.2s ease;
            margin-right: 6px;
        }

        .action-btn:hover {
            background: var(--column-bg);
        }

        .action-btn.danger {
            color: var(--danger);
            border-color: var(--danger);
        }

        .action-btn.danger:hover {
            background: #FEF2F2;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .role-badge.admin {
            background: #FEF3C7;
            color: #D97706;
        }

        .role-badge.normal {
            background: #E0E7FF;
            color: var(--primary);
        }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 12px;
            padding: 28px 32px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-form-group {
            margin-bottom: 16px;
        }

        .modal-form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        .modal-form-label .required {
            color: var(--danger);
            margin-left: 2px;
        }

        .modal-form-input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .modal-form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b;
            color: white;
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { background: #10B981; }
        .toast.danger  { background: var(--danger); }

        @media (max-width: 768px) {
            .search-form {
                grid-template-columns: 1fr;
            }
            .table {
                font-size: 12px;
            }
            .tabs {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h2 class="page-title">
            <i class="ri-admin-line"></i>
            <span>系统管理</span>
        </h2>
        <div class="breadcrumb">
            <i class="ri-home-line"></i>
            <span>></span>
            <span>系统管理</span>
        </div>
    </div>

    <!-- Tab 导航 -->
    <div class="tabs-container">
        <div class="tabs">
            <div class="tab active" data-tab="user" onclick="switchTab('user')">
                <i class="ri-user-settings-line"></i>
                <span>用户管理</span>
            </div>
            <div class="tab" data-tab="role" onclick="switchTab('role')">
                <i class="ri-shield-user-line"></i>
                <span>角色管理</span>
            </div>
        </div>
    </div>

    <div class="content-area">
        <!-- 用户管理 Tab -->
        <div class="tab-content active" id="tab-user">
            <div class="search-section">
                <div class="search-form">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-input" placeholder="请输入用户名" id="searchName">
                    </div>
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <input type="text" class="form-input" placeholder="请输入手机号" id="searchPhone">
                    </div>
                    <div class="form-group">
                        <label class="form-label">状态</label>
                        <select class="form-input" id="searchStatus">
                            <option value="">全部</option>
                            <option value="active">启用</option>
                            <option value="inactive">停用</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex-direction: row; gap: 8px; align-self: flex-end;">
                        <button class="btn btn-primary" onclick="searchUser()">
                            <i class="ri-search-line"></i>
                            查询
                        </button>
                        <button class="btn btn-primary" onclick="openUserModal()">
                            <i class="ri-add-line"></i>
                            新增用户
                        </button>
                    </div>
                </div>
            </div>

            <div class="data-table">
                <table class="table">
                    <thead>
                        <tr>
                            <th>用户</th>
                            <th>手机号</th>
                            <th>角色</th>
                            <th>状态</th>
                            <th>最后登录</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- 角色管理 Tab -->
        <div class="tab-content" id="tab-role">
            <div class="search-section">
                <div class="search-form">
                    <div class="form-group">
                        <label class="form-label">角色名称</label>
                        <input type="text" class="form-input" placeholder="请输入角色名称" id="searchRoleName">
                    </div>
                    <div class="form-group" style="flex-direction: row; gap: 8px; align-self: flex-end;">
                        <button class="btn btn-primary" onclick="searchRole()">
                            <i class="ri-search-line"></i>
                            查询
                        </button>
                        <button class="btn btn-primary" onclick="openRoleModal()">
                            <i class="ri-add-line"></i>
                            新增角色
                        </button>
                    </div>
                </div>
            </div>

            <div class="data-table">
                <table class="table">
                    <thead>
                        <tr>
                            <th>角色名称</th>
                            <th>角色编码</th>
                            <th>描述</th>
                            <th>用户数</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="roleTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- 新增/编辑用户弹窗 -->
    <div class="modal-overlay" id="userModal">
        <div class="modal-box" style="width: 480px;">
            <div class="modal-title">
                <i class="ri-user-add-line" id="userModalIcon"></i>
                <span id="userModalTitle">新增用户</span>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px;">
                <div class="modal-form-group">
                    <label class="modal-form-label">用户名<span class="required">*</span></label>
                    <input type="text" class="modal-form-input" id="userUsername" placeholder="登录账号">
                </div>
                <div class="modal-form-group">
                    <label class="modal-form-label">姓名<span class="required">*</span></label>
                    <input type="text" class="modal-form-input" id="userNickname" placeholder="真实姓名">
                </div>
                <div class="modal-form-group">
                    <label class="modal-form-label">邮箱<span class="required">*</span></label>
                    <input type="email" class="modal-form-input" id="userEmail" placeholder="example@domain.com">
                </div>
                <div class="modal-form-group">
                    <label class="modal-form-label">手机号</label>
                    <input type="text" class="modal-form-input" id="userPhone" placeholder="请输入手机号">
                </div>
                <div class="modal-form-group">
                    <label class="modal-form-label">角色<span class="required">*</span></label>
                    <select class="modal-form-input" id="userRole">
                        <option value="normal">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
                <div class="modal-form-group">
                    <label class="modal-form-label">状态</label>
                    <select class="modal-form-input" id="userStatus">
                        <option value="active">启用</option>
                        <option value="inactive">停用</option>
                    </select>
                </div>
            </div>
            <div class="modal-form-group" id="passwordGroup">
                <label class="modal-form-label">初始密码<span class="required">*</span></label>
                <input type="password" class="modal-form-input" id="userPassword" placeholder="请设置初始密码">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeUserModal()">取消</button>
                <button class="btn btn-primary" onclick="submitUserModal()">确认</button>
            </div>
        </div>
    </div>

    <!-- 新增/编辑角色弹窗 -->
    <div class="modal-overlay" id="roleModal">
        <div class="modal-box">
            <div class="modal-title">
                <i class="ri-shield-user-line" id="roleModalIcon"></i>
                <span id="roleModalTitle">新增角色</span>
            </div>
            <div class="modal-form-group">
                <label class="modal-form-label">角色名称<span class="required">*</span></label>
                <input type="text" class="modal-form-input" id="roleName" placeholder="请输入角色名称">
            </div>
            <div class="modal-form-group">
                <label class="modal-form-label">角色编码<span class="required">*</span></label>
                <input type="text" class="modal-form-input" id="roleCode" placeholder="请输入角色编码，如 ADMIN">
            </div>
            <div class="modal-form-group">
                <label class="modal-form-label">描述</label>
                <input type="text" class="modal-form-input" id="roleDesc" placeholder="请输入角色描述">
            </div>
            <div class="modal-form-group" id="rolePermGroup">
                <label class="modal-form-label">权限配置</label>
                <div id="rolePermTree" style="max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; padding: 12px;">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeRoleModal()">取消</button>
                <button class="btn btn-primary" onclick="submitRoleModal()">确认</button>
            </div>
        </div>
    </div>

    <!-- 权限配置弹窗 -->
    <div class="modal-overlay" id="permModal">
        <div class="modal-box" style="width: 500px;">
            <div class="modal-title">
                <i class="ri-lock-unlock-line"></i>
                <span>权限配置 - <span id="permRoleName"></span></span>
            </div>
            <div id="permTree" style="max-height: 360px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; padding: 12px;">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closePermModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmPermModal()">确认</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ============ Tab 切换 ============
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');

            // 切换时渲染对应内容
            if (tab === 'user') renderUserTable();
            else if (tab === 'role') renderRoleTable();
        }

        // ============ Toast 提示 ============
        let toastTimer = null;
        function showToast(msg, type = 'success') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show ' + type;
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { el.className = 'toast'; }, 2500);
        }

        // ============ 用户管理 ============
        const users = [
            { id: 1, username: 'admin', nickname: '系统管理员', role: 'admin', email: 'admin@example.com', phone: '13800138000', status: 'active', lastLogin: '2026-03-31 08:30:00', createTime: '2024-01-01 10:00:00' },
            { id: 2, username: 'zhangsan', nickname: '张三', role: 'normal', email: 'zhangsan@example.com', phone: '13800138001', status: 'active', lastLogin: '2026-03-30 14:20:00', createTime: '2024-01-15 14:30:00' },
            { id: 3, username: 'lisi', nickname: '李四', role: 'normal', email: 'lisi@example.com', phone: '13800138002', status: 'active', lastLogin: '2026-03-29 09:15:00', createTime: '2024-02-20 09:15:00' },
            { id: 4, username: 'wangwu', nickname: '王五', role: 'admin', email: 'wangwu@example.com', phone: '13800138003', status: 'active', lastLogin: '2026-03-31 10:00:00', createTime: '2024-03-05 11:20:00' },
            { id: 5, username: 'zhaoliu', nickname: '赵六', role: 'normal', email: 'zhaoliu@example.com', phone: '13800138004', status: 'inactive', lastLogin: '2026-03-20 16:45:00', createTime: '2024-03-10 16:45:00' }
        ];

        let nextUserId = 100;
        let userModalMode = 'add';
        let editUserId = null;

        function renderUserTable() {
            const tbody = document.getElementById('userTableBody');
            const nameFilter = document.getElementById('searchName').value.trim().toLowerCase();
            const phoneFilter = document.getElementById('searchPhone').value.trim().toLowerCase();
            const statusFilter = document.getElementById('searchStatus').value;

            const filteredUsers = users.filter(user => {
                if (nameFilter && !user.username.toLowerCase().includes(nameFilter) && !user.nickname.toLowerCase().includes(nameFilter)) return false;
                if (phoneFilter && !user.phone.includes(phoneFilter)) return false;
                if (statusFilter && user.status !== statusFilter) return false;
                return true;
            });

            if (filteredUsers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 40px; color: var(--text-secondary);"><i class="ri-user-follow-line" style="font-size: 48px; margin-bottom: 12px; display: block; opacity: 0.5;"></i><p>暂无用户数据</p></td></tr>`;
                return;
            }

            tbody.innerHTML = filteredUsers.map(user => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div class="avatar">${user.nickname.charAt(0)}</div>
                            <div>
                                <div style="font-weight: 600;">${user.username}</div>
                                <div style="font-size: 12px; color: var(--text-secondary);">${user.nickname}</div>
                            </div>
                        </div>
                    </td>
                    <td>${user.phone || '-'}</td>
                    <td><span class="role-badge ${user.role}">${user.role === 'admin' ? '管理员' : '普通用户'}</span></td>
                    <td><span class="status-badge ${user.status}">${user.status === 'active' ? '启用' : '停用'}</span></td>
                    <td>${user.lastLogin || '-'}</td>
                    <td>${user.createTime}</td>
                    <td>
                        <button class="action-btn" onclick="openEditUserModal(${user.id})">编辑</button>
                        <button class="action-btn" onclick="resetPassword(${user.id})">重置密码</button>
                        <button class="action-btn danger" onclick="deleteUser(${user.id}, '${user.nickname}')">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        function searchUser() {
            renderUserTable();
        }

        function openUserModal() {
            userModalMode = 'add';
            editUserId = null;
            document.getElementById('userModalIcon').className = 'ri-user-add-line';
            document.getElementById('userModalTitle').textContent = '新增用户';
            document.getElementById('userUsername').value = '';
            document.getElementById('userNickname').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userPhone').value = '';
            document.getElementById('userRole').value = 'normal';
            document.getElementById('userStatus').value = 'active';
            document.getElementById('userPassword').value = '';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('userModal').classList.add('active');
            setTimeout(() => document.getElementById('userUsername').focus(), 100);
        }

        function openEditUserModal(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;
            userModalMode = 'edit';
            editUserId = userId;
            document.getElementById('userModalIcon').className = 'ri-edit-line';
            document.getElementById('userModalTitle').textContent = '编辑用户';
            document.getElementById('userUsername').value = user.username;
            document.getElementById('userNickname').value = user.nickname;
            document.getElementById('userEmail').value = user.email;
            document.getElementById('userPhone').value = user.phone || '';
            document.getElementById('userRole').value = user.role;
            document.getElementById('userStatus').value = user.status;
            document.getElementById('userPassword').value = '';
            document.getElementById('passwordGroup').style.display = 'none';
            document.getElementById('userModal').classList.add('active');
        }

        function closeUserModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        function submitUserModal() {
            const username = document.getElementById('userUsername').value.trim();
            const nickname = document.getElementById('userNickname').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const phone = document.getElementById('userPhone').value.trim();
            const role = document.getElementById('userRole').value;
            const status = document.getElementById('userStatus').value;
            const password = document.getElementById('userPassword').value.trim();

            if (!username) { showToast('用户名不能为空', 'danger'); return; }
            if (!nickname) { showToast('姓名不能为空', 'danger'); return; }
            if (!email) { showToast('邮箱不能为空', 'danger'); return; }
            if (userModalMode === 'add' && !password) { showToast('初始密码不能为空', 'danger'); return; }

            const now = new Date();
            const createTime = now.toISOString().replace('T', ' ').substring(0, 19);

            if (userModalMode === 'add') {
                if (users.find(u => u.username === username)) { showToast('用户名已存在', 'danger'); return; }
                users.push({ id: nextUserId++, username, nickname, email, phone, role, status, lastLogin: null, createTime });
                showToast(`用户「${nickname}」新增成功`, 'success');
            } else {
                const user = users.find(u => u.id === editUserId);
                if (user) { user.nickname = nickname; user.email = email; user.phone = phone; user.role = role; user.status = status; }
                showToast(`用户「${nickname}」更新成功`, 'success');
            }

            renderUserTable();
            closeUserModal();
        }

        function deleteUser(userId, nickname) {
            if (!confirm(`确定要删除用户「${nickname}」吗？`)) return;
            const idx = users.findIndex(u => u.id === userId);
            if (idx > -1) { users.splice(idx, 1); renderUserTable(); showToast(`用户「${nickname}」已删除`, 'success'); }
        }

        function resetPassword(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;
            if (!confirm(`确定要重置用户「${user.nickname}」的密码吗？`)) return;
            showToast(`用户「${user.nickname}」密码已重置为: 123456`, 'success');
        }

        // ============ 角色管理 ============
        const roles = [
            { id: 1, name: '超级管理员', code: 'SUPER_ADMIN', desc: '拥有系统所有权限', userCount: 2, createTime: '2024-01-01 10:00:00', permissions: ['system', 'org', 'user', 'role', 'permission', 'log'] },
            { id: 2, name: '普通管理员', code: 'ADMIN', desc: '除权限管理外的所有权限', userCount: 3, createTime: '2024-01-15 14:30:00', permissions: ['system', 'org', 'user', 'role', 'log'] },
            { id: 3, name: '运维人员', code: 'OPS', desc: '系统运维角色', userCount: 1, createTime: '2024-02-20 09:15:00', permissions: ['system', 'log'] },
            { id: 4, name: '普通用户', code: 'USER', desc: '基础访问权限', userCount: 10, createTime: '2024-03-05 11:20:00', permissions: [] }
        ];

        let nextRoleId = 100;
        let roleModalMode = 'add';
        let editRoleId = null;
        let currentPermRoleId = null;
        let currentPermSelections = [];

        const menuItems = [
            { id: 'system', name: '系统管理', icon: 'ri-dashboard-line' },
            { id: 'org', name: '组织管理', icon: 'ri-team-line' },
            { id: 'user', name: '用户管理', icon: 'ri-user-settings-line' },
            { id: 'role', name: '角色管理', icon: 'ri-shield-user-line' },
            { id: 'permission', name: '权限管理', icon: 'ri-lock-unlock-line' },
            { id: 'log', name: '操作日志', icon: 'ri-file-list-3-line' }
        ];

        function renderRoleTable() {
            const tbody = document.getElementById('roleTableBody');
            const nameFilter = document.getElementById('searchRoleName').value.trim().toLowerCase();

            const filteredRoles = roles.filter(role => {
                if (nameFilter && !role.name.toLowerCase().includes(nameFilter) && !role.code.toLowerCase().includes(nameFilter)) return false;
                return true;
            });

            if (filteredRoles.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-secondary);"><i class="ri-shield-user-line" style="font-size: 48px; margin-bottom: 12px; display: block; opacity: 0.5;"></i><p>暂无角色数据</p></td></tr>`;
                return;
            }

            tbody.innerHTML = filteredRoles.map(role => `
                <tr>
                    <td style="font-weight: 600;">${role.name}</td>
                    <td><code style="background: var(--column-bg); padding: 2px 6px; border-radius: 4px; font-size: 12px;">${role.code}</code></td>
                    <td>${role.desc || '-'}</td>
                    <td>${role.userCount}</td>
                    <td>${role.createTime}</td>
                    <td>
                        <button class="action-btn" onclick="openPermModal(${role.id})">权限配置</button>
                        <button class="action-btn" onclick="openEditRoleModal(${role.id})">编辑</button>
                        <button class="action-btn danger" onclick="deleteRole(${role.id}, '${role.name}')">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        function searchRole() {
            renderRoleTable();
        }

        function openRoleModal() {
            roleModalMode = 'add';
            editRoleId = null;
            document.getElementById('roleModalIcon').className = 'ri-add-line';
            document.getElementById('roleModalTitle').textContent = '新增角色';
            document.getElementById('roleName').value = '';
            document.getElementById('roleCode').value = '';
            document.getElementById('roleDesc').value = '';
            document.getElementById('roleModal').classList.add('active');
            renderRolePermTree([]);
            setTimeout(() => document.getElementById('roleName').focus(), 100);
        }

        function openEditRoleModal(roleId) {
            const role = roles.find(r => r.id === roleId);
            if (!role) return;
            roleModalMode = 'edit';
            editRoleId = roleId;
            document.getElementById('roleModalIcon').className = 'ri-edit-line';
            document.getElementById('roleModalTitle').textContent = '编辑角色';
            document.getElementById('roleName').value = role.name;
            document.getElementById('roleCode').value = role.code;
            document.getElementById('roleDesc').value = role.desc || '';
            document.getElementById('roleModal').classList.add('active');
            renderRolePermTree(role.permissions || []);
        }

        function closeRoleModal() {
            document.getElementById('roleModal').classList.remove('active');
        }

        function renderRolePermTree(selectedPerms) {
            const container = document.getElementById('rolePermTree');
            container.innerHTML = menuItems.map(item => `
                <div style="display: flex; align-items: center; gap: 8px; padding: 6px 0;">
                    <input type="checkbox" id="rolePerm_${item.id}" ${selectedPerms.includes(item.id) ? 'checked' : ''}>
                    <label for="rolePerm_${item.id}" style="cursor: pointer;">${item.name}</label>
                </div>
            `).join('');
        }

        function getSelectedPerms() {
            return menuItems.filter(item => document.getElementById(`rolePerm_${item.id}`)?.checked).map(item => item.id);
        }

        function submitRoleModal() {
            const name = document.getElementById('roleName').value.trim();
            const code = document.getElementById('roleCode').value.trim().toUpperCase();
            const desc = document.getElementById('roleDesc').value.trim();
            const perms = getSelectedPerms();

            if (!name) { showToast('角色名称不能为空', 'danger'); return; }
            if (!code) { showToast('角色编码不能为空', 'danger'); return; }

            if (roleModalMode === 'add') {
                if (roles.find(r => r.code === code)) { showToast('角色编码已存在', 'danger'); return; }
                roles.push({ id: nextRoleId++, name, code, desc, userCount: 0, createTime: new Date().toISOString().replace('T', ' ').substring(0, 19), permissions: perms });
                showToast(`角色「${name}」新增成功`, 'success');
            } else {
                const role = roles.find(r => r.id === editRoleId);
                if (role) { role.name = name; role.code = code; role.desc = desc; role.permissions = perms; }
                showToast(`角色「${name}」更新成功`, 'success');
            }

            renderRoleTable();
            closeRoleModal();
        }

        function deleteRole(roleId, name) {
            const role = roles.find(r => r.id === roleId);
            if (role && role.userCount > 0) { showToast(`该角色下有${role.userCount}个用户，无法删除`, 'danger'); return; }
            if (!confirm(`确定要删除角色「${name}」吗？`)) return;
            const idx = roles.findIndex(r => r.id === roleId);
            if (idx > -1) { roles.splice(idx, 1); renderRoleTable(); showToast(`角色「${name}」已删除`, 'success'); }
        }

        // ============ 权限配置弹窗 ============
        function openPermModal(roleId) {
            const role = roles.find(r => r.id === roleId);
            if (!role) return;
            currentPermRoleId = roleId;
            currentPermSelections = [...(role.permissions || [])];
            document.getElementById('permRoleName').textContent = role.name;
            renderPermTree();
            document.getElementById('permModal').classList.add('active');
        }

        function closePermModal() {
            document.getElementById('permModal').classList.remove('active');
        }

        function renderPermTree() {
            const container = document.getElementById('permTree');
            container.innerHTML = menuItems.map(item => `
                <div style="display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border);">
                    <input type="checkbox" id="perm_${item.id}" ${currentPermSelections.includes(item.id) ? 'checked' : ''} onchange="togglePerm('${item.id}')">
                    <label for="perm_${item.id}" style="cursor: pointer; font-weight: 500;">${item.name}</label>
                </div>
            `).join('');
        }

        function togglePerm(permId) {
            if (currentPermSelections.includes(permId)) {
                currentPermSelections = currentPermSelections.filter(p => p !== permId);
            } else {
                currentPermSelections.push(permId);
            }
        }

        function confirmPermModal() {
            const role = roles.find(r => r.id === currentPermRoleId);
            if (role) { role.permissions = [...currentPermSelections]; }
            showToast('权限配置已更新', 'success');
            closePermModal();
            renderRoleTable();
        }

        // ============ 初始化 ============
        document.addEventListener('DOMContentLoaded', function() {
            renderUserTable();
            console.log('[Init] Admin management page loaded');
        });
    </script>
</body>
</html>
