<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站点管理 - 网关管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #F9FAFB;
            --column-bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--primary-bg);
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 14px;
        }

        .page-container {
            padding: 24px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--column-bg);
        }

        .search-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .search-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-input {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .data-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table thead {
            background: var(--column-bg);
        }

        .table th {
            padding: 14px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table td {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
        }

        .table tbody tr:hover {
            background: var(--column-bg);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.active {
            background: #ECFDF5;
            color: var(--success);
        }

        .status-badge.inactive {
            background: #F1F5F9;
            color: var(--text-secondary);
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: white;
            color: var(--text-primary);
            transition: all 0.2s ease;
            margin-right: 6px;
        }

        .action-btn:hover {
            background: var(--column-bg);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideIn 0.2s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: var(--column-bg);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .form-section {
            margin-bottom: 24px;
        }

        .form-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--column-bg);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }

        .text-area {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            min-height: 80px;
            resize: vertical;
        }

        .text-area:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        @media (max-width: 768px) {
            .page-container {
                padding: 16px;
            }

            .search-form {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .table {
                font-size: 12px;
            }

            .table th, .table td {
                padding: 10px 8px;
            }

            .action-btn {
                padding: 4px 8px;
                margin-right: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <h1 class="page-title">站点管理</h1>
            <button class="btn btn-primary" onclick="openModal('create')">
                <i class="ri-add-line"></i>
                新增站点
            </button>
        </div>

        <div class="search-section">
            <div class="search-form">
                <div class="form-group">
                    <label class="form-label">站点名称</label>
                    <input type="text" class="form-input" placeholder="请输入站点名称" id="searchName">
                </div>
                <div class="form-group">
                    <label class="form-label">站点标识</label>
                    <input type="text" class="form-input" placeholder="请输入站点标识" id="searchCode">
                </div>
                <div class="form-group">
                    <label class="form-label">状态</label>
                    <select class="form-input" id="searchStatus">
                        <option value="">全部</option>
                        <option value="active">正常</option>
                        <option value="inactive">停用</option>
                    </select>
                </div>
                <div class="form-group">
                    <button class="btn btn-primary" onclick="searchSites()">
                        <i class="ri-search-line"></i>
                        查询
                    </button>
                    <button class="btn btn-secondary" onclick="resetSearch()">
                        <i class="ri-refresh-line"></i>
                        重置
                    </button>
                </div>
            </div>
        </div>

        <div class="data-table">
            <table class="table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>站点名称</th>
                        <th>访问域名</th>
                        <th>目标域名</th>
                        <th>状态</th>
                        <th>更新时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="siteTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="siteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">新增站点</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="siteForm">
                    <input type="hidden" id="editSiteId">
                    
                    <div class="form-section">
                        <h4 class="form-section-title">基础配置</h4>
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">所属应用 <span style="color: var(--danger);">*</span></label>
                                <select class="form-input" id="siteApp" required>
                                    <option value="">请选择应用</option>
                                    <option value="APP001">应用-001</option>
                                    <option value="APP002">应用-002</option>
                                    <option value="APP003">应用-003</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">站点名称 <span style="color: var(--danger);">*</span></label>
                                <input type="text" class="form-input" id="siteName" placeholder="请输入站点名称" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">站点标识 <span style="color: var(--danger);">*</span></label>
                                <input type="text" class="form-input" id="siteCode" placeholder="请输入站点标识" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">根路径 <span style="color: var(--danger);">*</span></label>
                                <input type="text" class="form-input" id="sitePath" placeholder="/" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">访问域名 <span style="color: var(--danger);">*</span></label>
                                <input type="text" class="form-input" id="accessDomain" placeholder="www.example.com" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">目标服务器 <span style="color: var(--danger);">*</span></label>
                                <input type="text" class="form-input" id="targetServer" placeholder="backend.example.com" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">目标路径 <span style="color: var(--danger);">*</span></label>
                                <input type="text" class="form-input" id="targetPath" placeholder="/backend/service" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">网络协议</label>
                                <select class="form-input" id="protocol">
                                    <option value="HTTP">HTTP</option>
                                    <option value="HTTPS" selected>HTTPS</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group" style="margin-top: 16px;">
                            <label class="form-label">站点描述</label>
                            <textarea class="text-area" id="siteDesc" placeholder="请输入站点描述"></textarea>
                        </div>
                    </div>

                    <div class="form-section">
                        <h4 class="form-section-title">访问控制</h4>
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">是否需要登录</label>
                                <select class="form-input" id="requireLogin">
                                    <option value="no">否</option>
                                    <option value="yes">是</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">访问范围</label>
                                <select class="form-input" id="accessScope">
                                    <option value="all">无限制</option>
                                    <option value="partial">部分组织或成员</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">IP限制</label>
                                <select class="form-input" id="ipRestriction">
                                    <option value="none">不限制</option>
                                    <option value="whitelist">白名单</option>
                                    <option value="blacklist">黑名单</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">启用状态</label>
                                <select class="form-input" id="siteStatus">
                                    <option value="active">正常</option>
                                    <option value="inactive">停用</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h4 class="form-section-title">高级设置</h4>
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">负载方式</label>
                                <select class="form-input" id="loadBalance">
                                    <option value="random">随机轮询</option>
                                    <option value="hash">一致性哈希</option>
                                    <option value="least">最新链接数</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">连接超时(毫秒)</label>
                                <input type="number" class="form-input" id="connectTimeout" value="3000">
                            </div>
                            <div class="form-group">
                                <label class="form-label">发送超时(毫秒)</label>
                                <input type="number" class="form-input" id="sendTimeout" value="5000">
                            </div>
                            <div class="form-group">
                                <label class="form-label">接收超时(毫秒)</label>
                                <input type="number" class="form-input" id="receiveTimeout" value="10000">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveSite()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let sites = [];
        let currentEditingId = null;

        function generateMockData() {
            const statuses = ['active', 'inactive'];
            const protocols = ['HTTP', 'HTTPS'];
            const loadBalances = ['random', 'hash', 'least'];

            for (let i = 1; i <= 12; i++) {
                sites.push({
                    id: i,
                    name: `站点-${i}`,
                    code: `SITE${String(i).padStart(3, '0')}`,
                    app: `APP00${(i % 3) + 1}`,
                    accessDomain: `site${i}.example.com`,
                    targetDomain: `backend${(i % 4) + 1}.internal.com`,
                    rootPath: '/',
                    targetPath: `/backend/site${i}`,
                    description: `第${i}个站点的详细描述`,
                    protocol: protocols[i % protocols.length],
                    status: statuses[i % statuses.length],
                    loadBalance: loadBalances[i % loadBalances.length],
                    requireLogin: i % 2 === 0,
                    accessScope: 'all',
                    ipRestriction: 'none',
                    updateTime: new Date(Date.now() - Math.random() * 15 * 24 * 60 * 60 * 1000).toLocaleString('zh-CN')
                });
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('siteTableBody');
            tbody.innerHTML = '';

            data.forEach((site, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><strong>${site.name}</strong></td>
                    <td><code>${site.accessDomain}</code></td>
                    <td><code>${site.targetDomain}</code></td>
                    <td>
                        <span class="status-badge ${site.status}">
                            ${site.status === 'active' ? '正常' : '停用'}
                        </span>
                    </td>
                    <td>${site.updateTime}</td>
                    <td>
                        <button class="action-btn" onclick="openModal('edit', ${site.id})">
                            <i class="ri-edit-line"></i> 编辑
                        </button>
                        <button class="action-btn" onclick="toggleStatus(${site.id})">
                            <i class="ri-toggle-line"></i> ${site.status === 'active' ? '停用' : '启用'}
                        </button>
                        <button class="action-btn" onclick="deleteSite(${site.id})">
                            <i class="ri-delete-bin-line"></i> 删除
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function openModal(mode, id = null) {
            const modal = document.getElementById('siteModal');
            const title = document.getElementById('modalTitle');
            const form = document.getElementById('siteForm');

            form.reset();

            if (mode === 'edit' && id) {
                title.textContent = '编辑站点';
                const site = sites.find(s => s.id === id);
                if (site) {
                    document.getElementById('editSiteId').value = site.id;
                    document.getElementById('siteApp').value = site.app;
                    document.getElementById('siteName').value = site.name;
                    document.getElementById('siteCode').value = site.code;
                    document.getElementById('sitePath').value = site.rootPath;
                    document.getElementById('accessDomain').value = site.accessDomain;
                    document.getElementById('targetServer').value = site.targetDomain;
                    document.getElementById('targetPath').value = site.targetPath;
                    document.getElementById('siteDesc').value = site.description;
                    document.getElementById('protocol').value = site.protocol;
                    document.getElementById('loadBalance').value = site.loadBalance;
                    document.getElementById('siteStatus').value = site.status;
                    document.getElementById('requireLogin').value = site.requireLogin ? 'yes' : 'no';
                    document.getElementById('accessScope').value = site.accessScope;
                    document.getElementById('ipRestriction').value = site.ipRestriction;
                }
            } else {
                title.textContent = '新增站点';
                document.getElementById('editSiteId').value = '';
            }

            modal.classList.add('active');
            console.log(`[Modal] Opening site modal in ${mode} mode`);
        }

        function closeModal() {
            document.getElementById('siteModal').classList.remove('active');
        }

        function saveSite() {
            const app = document.getElementById('siteApp').value;
            const name = document.getElementById('siteName').value.trim();
            const code = document.getElementById('siteCode').value.trim();
            const accessDomain = document.getElementById('accessDomain').value.trim();
            const targetServer = document.getElementById('targetServer').value.trim();
            const targetPath = document.getElementById('targetPath').value.trim();
            const description = document.getElementById('siteDesc').value.trim();
            const protocol = document.getElementById('protocol').value;
            const status = document.getElementById('siteStatus').value;
            const loadBalance = document.getElementById('loadBalance').value;
            const requireLogin = document.getElementById('requireLogin').value === 'yes';
            const accessScope = document.getElementById('accessScope').value;
            const ipRestriction = document.getElementById('ipRestriction').value;
            const editId = document.getElementById('editSiteId').value;

            if (!app || !name || !code || !accessDomain || !targetServer || !targetPath) {
                alert('请填写必填字段');
                return;
            }

            if (editId) {
                const index = sites.findIndex(s => s.id === parseInt(editId));
                if (index !== -1) {
                    sites[index] = {
                        ...sites[index],
                        app, name, code, accessDomain, targetDomain: targetServer, targetPath,
                        description, protocol, status, loadBalance, requireLogin, accessScope, ipRestriction,
                        updateTime: new Date().toLocaleString('zh-CN')
                    };
                    console.log(`[Update] Site updated: ID=${editId}, Name=${name}`);
                }
            } else {
                const newId = Math.max(...sites.map(s => s.id), 0) + 1;
                sites.unshift({
                    id: newId,
                    app, name, code, accessDomain, targetDomain: targetServer, targetPath,
                    description, protocol, status, loadBalance, requireLogin, accessScope, ipRestriction,
                    updateTime: new Date().toLocaleString('zh-CN')
                });
                console.log(`[Create] Site created: ID=${newId}, Name=${name}`);
            }

            renderTable(sites);
            closeModal();
            localStorage.setItem('sites', JSON.stringify(sites));
            alert('保存成功');
        }

        function deleteSite(id) {
            if (confirm('确定要删除该站点吗？删除后不可恢复。')) {
                sites = sites.filter(s => s.id !== id);
                renderTable(sites);
                localStorage.setItem('sites', JSON.stringify(sites));
                console.log(`[Delete] Site deleted: ID=${id}`);
                alert('删除成功');
            }
        }

        function toggleStatus(id) {
            const site = sites.find(s => s.id === id);
            if (site) {
                const newStatus = site.status === 'active' ? 'inactive' : 'active';
                site.status = newStatus;
                site.updateTime = new Date().toLocaleString('zh-CN');
                renderTable(sites);
                localStorage.setItem('sites', JSON.stringify(sites));
                console.log(`[Status] Site ${id} status changed to ${newStatus}`);
                alert(newStatus === 'active' ? '已启用' : '已停用');
            }
        }

        function searchSites() {
            const nameKeyword = document.getElementById('searchName').value.toLowerCase();
            const codeKeyword = document.getElementById('searchCode').value.toLowerCase();
            const status = document.getElementById('searchStatus').value;

            const filtered = sites.filter(site => {
                const matchName = !nameKeyword || site.name.toLowerCase().includes(nameKeyword);
                const matchCode = !codeKeyword || site.code.toLowerCase().includes(codeKeyword);
                const matchStatus = !status || site.status === status;
                return matchName && matchCode && matchStatus;
            });

            renderTable(filtered);
            console.log(`[Search] Found ${filtered.length} sites matching criteria`);
        }

        function resetSearch() {
            document.getElementById('searchName').value = '';
            document.getElementById('searchCode').value = '';
            document.getElementById('searchStatus').value = '';
            renderTable(sites);
            console.log('[Search] Search criteria reset');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const savedSites = localStorage.getItem('sites');
            if (savedSites) {
                sites = JSON.parse(savedSites);
            } else {
                generateMockData();
                localStorage.setItem('sites', JSON.stringify(sites));
            }
            renderTable(sites);
            console.log('[Init] Site management page loaded');
        });

        document.getElementById('siteModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
