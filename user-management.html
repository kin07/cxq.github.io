<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 网关管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #F9FAFB;
            --column-bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--primary-bg);
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 14px;
        }

        .page-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: white;
            position: relative;
        }

        .page-header-actions {
            position: absolute;
            top: 16px;
            right: 20px;
            display: flex;
            gap: 8px;
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            background: var(--primary-bg);
        }

        .search-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 0 0 auto;
        }

        .form-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.2s ease;
            font-family: inherit;
            min-width: 150px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            font-size: 13px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: white;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--column-bg);
        }

        .btn-danger {
            background: white;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: #FEF2F2;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        .data-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table thead {
            background: var(--column-bg);
        }

        .table th {
            padding: 14px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table td {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
        }

        .table tbody tr:hover {
            background: var(--column-bg);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.active {
            background: #ECFDF5;
            color: var(--success);
        }

        .status-badge.inactive {
            background: #F1F5F9;
            color: var(--text-secondary);
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: white;
            color: var(--text-primary);
            transition: all 0.2s ease;
            margin-right: 6px;
        }

        .action-btn:hover {
            background: var(--column-bg);
        }

        .action-btn.danger {
            color: var(--danger);
            border-color: var(--danger);
        }

        .action-btn.danger:hover {
            background: #FEF2F2;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        /* 角色标签 */
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .role-badge.admin {
            background: #FEF3C7;
            color: #D97706;
        }

        .role-badge.normal {
            background: #E0E7FF;
            color: var(--primary);
        }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 12px;
            padding: 28px 32px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-form-group {
            margin-bottom: 16px;
        }

        .modal-form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        .modal-form-label .required {
            color: var(--danger);
            margin-left: 2px;
        }

        .modal-form-input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .modal-form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b;
            color: white;
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { background: #10B981; }
        .toast.danger  { background: var(--danger); }

        @media (max-width: 768px) {
            .search-form {
                grid-template-columns: 1fr;
            }

            .table {
                font-size: 12px;
            }

            .table th, .table td {
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h2 class="page-title">
            <i class="ri-user-settings-line"></i>
            <span>用户管理</span>
        </h2>
        <div class="breadcrumb">
            <i class="ri-home-line"></i>
            <span>></span>
            <span>系统管理</span>
            <span>></span>
            <span>用户管理</span>
        </div>
        <div class="page-header-actions">
            <button class="btn btn-primary" onclick="openUserModal()">
                <i class="ri-add-line"></i>
                新增用户
            </button>
        </div>
    </div>

    <div class="content-area">
        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-form">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" placeholder="请输入用户名" id="searchName">
                </div>
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="text" class="form-input" placeholder="请输入手机号" id="searchPhone">
                </div>
                <div class="form-group">
                    <label class="form-label">状态</label>
                    <select class="form-input" id="searchStatus">
                        <option value="">全部</option>
                        <option value="active">启用</option>
                        <option value="inactive">停用</option>
                    </select>
                </div>
                <div class="form-group" style="flex-direction: row; gap: 8px; align-self: flex-end;">
                    <button class="btn btn-primary" onclick="searchData()">
                        <i class="ri-search-line"></i>
                        查询
                    </button>
                </div>
            </div>
        </div>

        <!-- 用户列表表格 -->
        <div class="data-table">
            <table class="table">
                <thead>
                    <tr>
                        <th>用户</th>
                        <th>手机号</th>
                        <th>角色</th>
                        <th>状态</th>
                        <th>最后登录</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- 新增/编辑用户弹窗 -->
    <div class="modal-overlay" id="userModal">
        <div class="modal-box" style="width: 480px;">
            <div class="modal-title">
                <i class="ri-user-add-line" id="userModalIcon"></i>
                <span id="userModalTitle">新增用户</span>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px;">
                <div class="modal-form-group">
                    <label class="modal-form-label">用户名<span class="required">*</span></label>
                    <input type="text" class="modal-form-input" id="userUsername" placeholder="登录账号">
                </div>
                <div class="modal-form-group">
                    <label class="modal-form-label">姓名<span class="required">*</span></label>
                    <input type="text" class="modal-form-input" id="userNickname" placeholder="真实姓名">
                </div>
                <div class="modal-form-group">
                    <label class="modal-form-label">邮箱<span class="required">*</span></label>
                    <input type="email" class="modal-form-input" id="userEmail" placeholder="example@domain.com">
                </div>
                <div class="modal-form-group">
                    <label class="modal-form-label">手机号</label>
                    <input type="text" class="modal-form-input" id="userPhone" placeholder="请输入手机号">
                </div>
                <div class="modal-form-group">
                    <label class="modal-form-label">角色<span class="required">*</span></label>
                    <select class="modal-form-input" id="userRole">
                        <option value="normal">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
                <div class="modal-form-group">
                    <label class="modal-form-label">状态</label>
                    <select class="modal-form-input" id="userStatus">
                        <option value="active">启用</option>
                        <option value="inactive">停用</option>
                    </select>
                </div>
            </div>
            <div class="modal-form-group" id="passwordGroup">
                <label class="modal-form-label">初始密码<span class="required">*</span></label>
                <input type="password" class="modal-form-input" id="userPassword" placeholder="请设置初始密码">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeUserModal()">取消</button>
                <button class="btn btn-primary" onclick="submitUserModal()">确认</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // 用户数据
        const users = [
            { id: 1, username: 'admin', nickname: '系统管理员', role: 'admin', email: 'admin@example.com', phone: '13800138000', status: 'active', lastLogin: '2026-03-31 08:30:00', createTime: '2024-01-01 10:00:00' },
            { id: 2, username: 'zhangsan', nickname: '张三', role: 'normal', email: 'zhangsan@example.com', phone: '13800138001', status: 'active', lastLogin: '2026-03-30 14:20:00', createTime: '2024-01-15 14:30:00' },
            { id: 3, username: 'lisi', nickname: '李四', role: 'normal', email: 'lisi@example.com', phone: '13800138002', status: 'active', lastLogin: '2026-03-29 09:15:00', createTime: '2024-02-20 09:15:00' },
            { id: 4, username: 'wangwu', nickname: '王五', role: 'admin', email: 'wangwu@example.com', phone: '13800138003', status: 'active', lastLogin: '2026-03-31 10:00:00', createTime: '2024-03-05 11:20:00' },
            { id: 5, username: 'zhaoliu', nickname: '赵六', role: 'normal', email: 'zhaoliu@example.com', phone: '13800138004', status: 'inactive', lastLogin: '2026-03-20 16:45:00', createTime: '2024-03-10 16:45:00' }
        ];

        let nextUserId = 100;
        let userModalMode = 'add';
        let editUserId = null;

        // ============ 工具函数 ============
        let toastTimer = null;
        function showToast(msg, type = 'success') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show ' + type;
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { el.className = 'toast'; }, 2500);
        }

        // ============ 渲染用户表格 ============
        function renderUserTable() {
            const tbody = document.getElementById('userTableBody');
            const nameFilter = document.getElementById('searchName').value.trim().toLowerCase();
            const phoneFilter = document.getElementById('searchPhone').value.trim().toLowerCase();
            const statusFilter = document.getElementById('searchStatus').value;

            const filteredUsers = users.filter(user => {
                if (nameFilter && !user.username.toLowerCase().includes(nameFilter) && !user.nickname.toLowerCase().includes(nameFilter)) return false;
                if (phoneFilter && !user.phone.includes(phoneFilter)) return false;
                if (statusFilter && user.status !== statusFilter) return false;
                return true;
            });

            if (filteredUsers.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px; color: var(--text-secondary);">
                            <i class="ri-user-follow-line" style="font-size: 48px; margin-bottom: 12px; display: block; opacity: 0.5;"></i>
                            <p>暂无用户数据</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = filteredUsers.map(user => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div class="avatar">${user.nickname.charAt(0)}</div>
                            <div>
                                <div style="font-weight: 600;">${user.username}</div>
                                <div style="font-size: 12px; color: var(--text-secondary);">${user.nickname}</div>
                            </div>
                        </div>
                    </td>
                    <td>${user.phone || '-'}</td>
                    <td><span class="role-badge ${user.role}">${user.role === 'admin' ? '管理员' : '普通用户'}</span></td>
                    <td><span class="status-badge ${user.status}">${user.status === 'active' ? '启用' : '停用'}</span></td>
                    <td>${user.lastLogin || '-'}</td>
                    <td>${user.createTime}</td>
                    <td>
                        <button class="action-btn" onclick="openEditUserModal(${user.id})">编辑</button>
                        <button class="action-btn" onclick="resetPassword(${user.id})">重置密码</button>
                        <button class="action-btn danger" onclick="deleteUser(${user.id}, '${user.nickname}')">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // ============ 搜索 ============
        function searchData() {
            renderUserTable();
        }

        // ============ 新增/编辑用户弹窗 ============
        function openUserModal() {
            userModalMode = 'add';
            editUserId = null;
            document.getElementById('userModalIcon').className = 'ri-user-add-line';
            document.getElementById('userModalTitle').textContent = '新增用户';
            document.getElementById('userUsername').value = '';
            document.getElementById('userNickname').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userPhone').value = '';
            document.getElementById('userRole').value = 'normal';
            document.getElementById('userStatus').value = 'active';
            document.getElementById('userPassword').value = '';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('userModal').classList.add('active');
            setTimeout(() => document.getElementById('userUsername').focus(), 100);
        }

        function openEditUserModal(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;

            userModalMode = 'edit';
            editUserId = userId;
            document.getElementById('userModalIcon').className = 'ri-edit-line';
            document.getElementById('userModalTitle').textContent = '编辑用户';
            document.getElementById('userUsername').value = user.username;
            document.getElementById('userNickname').value = user.nickname;
            document.getElementById('userEmail').value = user.email;
            document.getElementById('userPhone').value = user.phone || '';
            document.getElementById('userRole').value = user.role;
            document.getElementById('userStatus').value = user.status;
            document.getElementById('userPassword').value = '';
            document.getElementById('passwordGroup').style.display = 'none';
            document.getElementById('userModal').classList.add('active');
            setTimeout(() => document.getElementById('userNickname').focus(), 100);
        }

        function closeUserModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        function submitUserModal() {
            const username = document.getElementById('userUsername').value.trim();
            const nickname = document.getElementById('userNickname').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const phone = document.getElementById('userPhone').value.trim();
            const role = document.getElementById('userRole').value;
            const status = document.getElementById('userStatus').value;
            const password = document.getElementById('userPassword').value.trim();

            if (!username) { showToast('用户名不能为空', 'danger'); document.getElementById('userUsername').focus(); return; }
            if (!nickname) { showToast('姓名不能为空', 'danger'); document.getElementById('userNickname').focus(); return; }
            if (!email) { showToast('邮箱不能为空', 'danger'); document.getElementById('userEmail').focus(); return; }
            if (userModalMode === 'add' && !password) { showToast('初始密码不能为空', 'danger'); document.getElementById('userPassword').focus(); return; }

            const now = new Date();
            const createTime = now.toISOString().replace('T', ' ').substring(0, 19);

            if (userModalMode === 'add') {
                // 检查用户名是否已存在
                if (users.find(u => u.username === username)) {
                    showToast('用户名已存在', 'danger');
                    return;
                }

                users.push({
                    id: nextUserId++,
                    username,
                    nickname,
                    email,
                    phone,
                    role,
                    status,
                    lastLogin: null,
                    createTime
                });
                showToast(`用户「${nickname}」新增成功`, 'success');
            } else {
                const user = users.find(u => u.id === editUserId);
                if (user) {
                    user.nickname = nickname;
                    user.email = email;
                    user.phone = phone;
                    user.role = role;
                    user.status = status;
                }
                showToast(`用户「${nickname}」更新成功`, 'success');
            }

            renderUserTable();
            closeUserModal();
        }

        // ============ 删除用户 ============
        function deleteUser(userId, nickname) {
            if (!confirm(`确定要删除用户「${nickname}」吗？此操作不可恢复。`)) return;

            const idx = users.findIndex(u => u.id === userId);
            if (idx > -1) {
                users.splice(idx, 1);
                renderUserTable();
                showToast(`用户「${nickname}」已删除`, 'success');
            }
        }

        // ============ 重置密码 ============
        function resetPassword(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;

            if (!confirm(`确定要重置用户「${user.nickname}」的密码吗？`)) return;

            showToast(`用户「${user.nickname}」密码已重置为: 123456`, 'success');
        }

        // ============ 初始化 ============
        document.addEventListener('DOMContentLoaded', function() {
            renderUserTable();
            console.log('[Init] User management page loaded');
        });
    </script>
</body>
</html>
